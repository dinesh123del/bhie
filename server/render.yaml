services:
  - type: web
    name: bhie-backend
    env: node
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: BODY_LIMIT
        value: 2mb
      - key: MAX_UPLOAD_FILE_SIZE_MB
        value: 10
      - key: OPENAI_API_KEY
        sync: false
