name: PR Review Reminder

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  review-reminder:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post review checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Biz Plus PR Automation',
              '- Run GitHub Copilot review suggestions in the PR Files Changed view',
              '- Check CI logs for lint, test, typecheck, and build output',
              '- Confirm dashboard, upload, analytics, and auth flows before merge',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
