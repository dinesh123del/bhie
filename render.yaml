services:
  - type: web
    name: bhie-api
    runtime: node
    rootDir: server
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromDatabase:
          name: bhie-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: BODY_LIMIT
        value: 2mb
      - key: MAX_UPLOAD_FILE_SIZE_MB
        value: 10
      - key: RAZORPAY_KEY_ID
        value: rzp_live_SYwkStp5U2NhjF
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        value: pk_test_51TI7iCAeY3RTYbZZ8bUJrYZBRhFFb24pPVU8CJTy4yjCkGol9ebphzJLMnCVJqYZEAlcoo8WyhQ5MzHQ8RAZOiXd00TkDKcyLx
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /api/health

databases:
  - name: bhie-db
    plan: free
    ipAllowList: []

envVarGroups:
  - name: production
    envVars:
      - key: NODE_ENV
        value: production
